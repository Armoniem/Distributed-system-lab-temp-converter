apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempconv-backend
  namespace: default
  labels:
    app: tempconv-backend
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tempconv-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: tempconv-backend
        version: "1.0.0"
    spec:
      containers:
        - name: backend
          image: europe-west1-docker.pkg.dev/temp-convertor-485913/tempconv/backend:latest
          imagePullPolicy: Always
          ports:
            - name: grpc
              containerPort: 50051
              protocol: TCP
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: GRPC_PORT
              value: "50051"
            - name: HTTP_PORT
              value: "8080"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          # POST-based probe using a valid conversion call
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
      securityContext:
        fsGroup: 65532
