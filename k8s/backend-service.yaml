apiVersion: v1
kind: Service
metadata:
  name: tempconv-backend
  namespace: default
  labels:
    app: tempconv-backend
  annotations:
    # Cloud Load Balancer - external TCP load balancer
    cloud.google.com/load-balancer-type: "External"
spec:
  type: LoadBalancer
  selector:
    app: tempconv-backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: grpc
      port: 50051
      targetPort: 50051
      protocol: TCP
