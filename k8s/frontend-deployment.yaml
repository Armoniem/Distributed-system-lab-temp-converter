apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempconv-frontend
  namespace: default
  labels:
    app: tempconv-frontend
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tempconv-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: tempconv-frontend
        version: "1.0.0"
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: frontend
          # Replace with your actual Artifact Registry path
          image: REGION-docker.pkg.dev/PROJECT_ID/tempconv/frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: false  # nginx needs root for port 80
