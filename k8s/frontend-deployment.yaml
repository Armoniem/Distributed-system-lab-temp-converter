apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempconv-frontend
  namespace: default
  labels:
    app: tempconv-frontend
    version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempconv-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: tempconv-frontend
        version: "1.0.0"
    spec:
      containers:
        - name: frontend
          image: europe-west1-docker.pkg.dev/temp-convertor-485913/tempconv/frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: false  # nginx needs root for port 80
