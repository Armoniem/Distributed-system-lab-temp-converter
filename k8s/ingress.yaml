apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tempconv-ingress
  namespace: default
  annotations:
    # Optional: reserve a static IP first with:
    # gcloud compute addresses create tempconv-ip --global
    # Then uncomment:
    # kubernetes.io/ingress.global-static-ip-name: "tempconv-ip"
spec:
  # GKE uses the "gce" class for its native HTTP(S) load balancer
  ingressClassName: gce
  rules:
    - http:
        paths:
          # Backend HTTP gateway — served at /tempconv.TempConverter/
          - path: /tempconv.TempConverter
            pathType: Prefix
            backend:
              service:
                name: tempconv-backend
                port:
                  number: 8080
          # Frontend — serves all other paths (must be last / least specific)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: tempconv-frontend
                port:
                  number: 80
