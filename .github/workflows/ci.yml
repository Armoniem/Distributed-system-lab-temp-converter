name: CI — Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Go backend ─────────────────────────────────────────────────────────────
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./internal/server/... -v -race -cover -coverprofile=coverage.out

      - name: Integration tests
        run: go test ./tests/integration/... -v -race

      - name: Build binary (linux/amd64)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o /dev/null ./cmd/server

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out

  # ── Flutter frontend ────────────────────────────────────────────────────────
  frontend:
    name: Frontend (Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Widget tests
        run: flutter test --no-pub

      - name: Build web (release)
        run: |
          flutter build web --release --no-pub \
            --dart-define=BACKEND_URL=http://backend-service:8080

  # ── Docker images ─────────────────────────────────────────────────────────
  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64
          push: false
          tags: tempconv/backend:${{ github.sha }}

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          platforms: linux/amd64
          push: false
          tags: tempconv/frontend:${{ github.sha }}
          build-args: |
            BACKEND_URL=http://backend-service:8080
