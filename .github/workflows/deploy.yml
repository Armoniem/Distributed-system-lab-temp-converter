name: CD — Deploy to GKE

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  PROJECT_ID: temp-convertor-485913
  REGION: europe-west1
  CLUSTER_NAME: tempconv-cluster
  REGISTRY: europe-west1-docker.pkg.dev/temp-convertor-485913/tempconv

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER_NAME }}
          location: ${{ env.REGION }}

      - name: Get Ingress IP (if exists)
        id: ingress
        run: |
          IP=$(kubectl get ingress tempconv-ingress -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
          echo "ip=$IP" >> $GITHUB_OUTPUT

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/backend:latest
            ${{ env.REGISTRY }}/backend:${{ github.sha }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/frontend:latest
            ${{ env.REGISTRY }}/frontend:${{ github.sha }}
          build-args: |
            BACKEND_URL=http://${{ steps.ingress.outputs.ip }}

      - name: Update image tags in deployments
        run: |
          kubectl set image deployment/tempconv-backend \
            backend=${{ env.REGISTRY }}/backend:${{ github.sha }}
          kubectl set image deployment/tempconv-frontend \
            frontend=${{ env.REGISTRY }}/frontend:${{ github.sha }}

      - name: Wait for rollouts
        run: |
          kubectl rollout status deployment/tempconv-backend --timeout=5m
          kubectl rollout status deployment/tempconv-frontend --timeout=5m

      - name: Smoke test
        run: |
          BACKEND_IP=$(kubectl get svc tempconv-backend -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          curl -sf -X POST http://${BACKEND_IP}:8080/tempconv.TempConverter/CelsiusToFahrenheit \
            -H 'Content-Type: application/json' \
            -d '{"value": 100}' | python3 -m json.tool
