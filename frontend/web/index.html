<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TempConv – a fast temperature converter powered by gRPC and Go, built with Flutter Web.">
  <meta name="theme-color" content="#0D0D1A">

  <!-- Open Graph -->
  <meta property="og:title" content="TempConv – Temperature Converter">
  <meta property="og:description" content="Convert between Celsius and Fahrenheit instantly using a gRPC-backed Go service.">
  <meta property="og:type" content="website">

  <!-- iOS meta tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TempConv">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Google Fonts — Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">

  <title>TempConv – Temperature Converter</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #0D0D1A;
      font-family: 'Inter', sans-serif;
    }
    /* Loading splash */
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0D0D1A;
      z-index: 9999;
      transition: opacity 0.4s ease;
    }
    #splash .logo {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6C63FF, #FF6584);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      box-shadow: 0 0 40px rgba(108,99,255,0.5);
      animation: pulse 1.8s ease-in-out infinite;
    }
    #splash p {
      color: rgba(255,255,255,0.5);
      margin-top: 20px;
      font-size: 14px;
      letter-spacing: 0.5px;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(108,99,255,0.4); }
      50% { transform: scale(1.06); box-shadow: 0 0 50px rgba(108,99,255,0.7); }
    }
  </style>
</head>
<body>
  <!-- Loading splash screen -->
  <div id="splash">
    <div class="logo">🌡️</div>
    <p>Loading TempConv…</p>
  </div>

  <script>
    // Hide splash when Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      const splash = document.getElementById('splash');
      if (splash) {
        splash.style.opacity = '0';
        setTimeout(() => splash.remove(), 400);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
