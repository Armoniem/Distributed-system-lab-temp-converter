version: "3.9"

# Local development stack — runs backend + frontend locally
# Usage: docker compose up --build

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "50051:50051"   # gRPC
      - "8080:8080"     # HTTP gateway
    environment:
      - GRPC_PORT=50051
      - HTTP_PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/tempconv.TempConverter/CelsiusToFahrenheit"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Points to backend via the docker network service name
        BACKEND_URL: http://backend:8080
    ports:
      - "3000:80"       # Flutter web UI at http://localhost:3000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
